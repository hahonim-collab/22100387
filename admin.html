<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#006241">
  <title>내부품질기한 DB 관리</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/admin.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <div>
      <h1>DB 관리</h1>
      <p>품목 추가·수정·삭제 및 JSON 백업</p>
    </div>
    <a class="header-link" href="./index.html">계산기로 돌아가기</a>
  </div>
</header>

<main class="container">
  <section id="loginPanel" class="panel login-panel">
    <h2>관리자 로그인</h2>
    <p class="muted"></p>
    <div class="login-grid">
      <div class="field"><label for="adminId">아이디</label><input id="adminId" value="22100387" autocomplete="username"></div>
      <div class="field"><label for="adminPw">비밀번호</label><input id="adminPw" type="password" autocomplete="current-password"></div>
    </div>
    <button id="loginBtn" class="primary-button" type="button">로그인</button>
    <p id="loginMessage" class="form-message"></p>
  </section>

  <div id="adminApp" hidden>
    <section class="panel github-panel">
      <div class="section-heading">
        <div>
          <h2>GitHub 자동 저장 설정</h2>
          <p>품목 저장 시 지정 저장소의 products.json을 자동 커밋합니다.</p>
        </div>
        <span id="githubConnectionBadge" class="count-badge">연결 안 됨</span>
      </div>

      <div class="github-settings-grid">
        <div class="field"><label for="githubOwner">소유자</label><input id="githubOwner" placeholder="예: hahonim"></div>
        <div class="field"><label for="githubRepo">저장소</label><input id="githubRepo" placeholder="예: 내부품질기한관리"></div>
        <div class="field"><label for="githubBranch">브랜치</label><input id="githubBranch" value="main"></div>
        <div class="field"><label for="githubPath">DB 파일 경로</label><input id="githubPath" value="data/products.json"></div>
        <div class="field full"><label for="githubToken">Fine-grained token</label><input id="githubToken" type="password" placeholder="현재 탭 세션에만 보관됩니다" autocomplete="off"></div>
      </div>

      <div class="toolbar github-actions">
        <button id="saveGithubSettingsBtn" class="ghost-button" type="button">설정 저장</button>
        <button id="testGithubBtn" class="ghost-button" type="button">연결 테스트</button>
        <button id="publishGithubBtn" class="primary-button" type="button">현재 DB GitHub에 게시</button>
      </div>

      <p class="security-note">토큰에는 해당 저장소의 <b>Contents: Read and write</b> 권한만 부여하세요. 토큰은 현재 관리자 탭에만 임시 저장됩니다.</p>
    </section>

    <section class="panel toolbar-panel">
      <div class="toolbar">
        <button id="addBtn" class="primary-button" type="button">새 품목 추가</button>
        <button id="exportBtn" class="ghost-button" type="button">JSON 내보내기</button>
        <label class="ghost-button file-button">JSON 가져오기<input id="importInput" type="file" accept=".json,application/json"></label>
        <button id="resetBtn" class="danger-button" type="button">기본 DB로 초기화</button>
        <button id="logoutBtn" class="ghost-button" type="button">로그아웃</button>
      </div>
      <div class="admin-status">
        <span id="adminDbStatus"></span>
        <span id="saveMessage"></span>
      </div>
    </section>

    <section class="admin-layout">
      <aside class="panel admin-list-panel">
        <div class="section-heading compact">
          <h2>품목 목록</h2>
          <span id="adminCount" class="count-badge"></span>
        </div>
        <input id="adminSearch" type="search" placeholder="품목명 또는 카테고리 검색">
        <div id="adminList" class="admin-list"></div>
      </aside>

      <section class="panel editor-panel">
        <div class="section-heading">
          <div>
            <h2 id="editorTitle">품목 편집</h2>
            <p id="editorHint">목록에서 품목을 선택하거나 새 품목을 추가하세요.</p>
          </div>
          <button id="deleteBtn" class="danger-button" type="button" disabled>삭제</button>
        </div>

        <form id="productForm">
          <input id="productId" type="hidden">
          <div class="editor-grid">
            <div class="field full"><label for="name">품목명 *</label><input id="name" required></div>
            <div class="field"><label for="category">카테고리 *</label><input id="category" list="categoryOptions" required><datalist id="categoryOptions"></datalist></div>
            <div class="field"><label for="storage">보관 방법</label><input id="storage"></div>
            <div class="field full rules-editor-section">
              <div class="rules-editor-head">
                <div>
                  <label>계산 기준</label>
                  <p>제조 후·소분 후·개봉 후·해동 후 등 필요한 기준을 자유롭게 추가할 수 있습니다.</p>
                </div>
                <button id="addRuleBtn" class="ghost-button" type="button">기준 추가</button>
              </div>
              <div id="rulesEditor" class="rules-editor"></div>
            </div>

            <div class="field full"><label for="tag">표기 방법</label><input id="tag"></div>
            <div class="field full"><label for="note">참고사항</label><textarea id="note" rows="4"></textarea></div>
            <div class="field full"><label for="keywords">검색 키워드</label><input id="keywords" placeholder="쉼표로 구분"></div>
            <div class="field"><label for="order">정렬 순서</label><input id="order" type="number" min="0"></div>
            <label class="check-field"><input id="enabled" type="checkbox" checked> 계산기 화면에 표시</label>
          </div>

          <div class="form-actions">
            <button class="primary-button" type="submit">저장</button>
            <button id="cancelBtn" class="ghost-button" type="button">입력 취소</button>
          </div>
        </form>
      </section>
    </section>
  </div>
</main>

<script src="./js/default-products.js"></script>
<script src="./js/db.js"></script>
<script src="./js/github.js"></script>
<script src="./js/admin.js"></script>
</body>
</html>
